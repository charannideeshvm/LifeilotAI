<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — LifePilot AI</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/dark-mode.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .auth-container { width: 100%; max-width: 420px; }
    .auth-header { text-align: center; margin-bottom: 32px; }
    .auth-logo { font-size: 2.5rem; margin-bottom: 8px; }
    .auth-header h2 { color: var(--text-main); margin-bottom: 4px; }
    .auth-header p { font-size: 0.875rem; }
    .auth-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 32px; box-shadow: var(--shadow-lg); }
    .auth-footer { text-align: center; margin-top: 20px; font-size: 0.875rem; color: var(--text-muted); }
    .divider { text-align: center; margin: 20px 0; color: var(--text-light); font-size: 0.8rem; position: relative; }
    .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 42%; height: 1px; background: var(--border); }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    .error-msg { background: #fee2e2; color: #991b1b; padding: 10px 14px; border-radius: var(--radius-sm); font-size: 0.875rem; margin-bottom: 16px; display: none; }
    body.dark .error-msg { background: rgba(239,68,68,0.2); color: #fca5a5; }
    .dark-btn-pos { position: fixed; top: 20px; right: 20px; }
  </style>
</head>
<body>
  <button class="dark-toggle dark-btn-pos" id="darkToggle" onclick="toggleDarkMode()">🌙</button>

  <div class="auth-container">
    <div class="auth-header">
      <div class="auth-logo">🧭</div>
      <h2>Welcome back</h2>
      <p>Sign in to your LifePilot AI account</p>
    </div>

    <div class="auth-card">
      <div class="error-msg" id="errorMsg"></div>

      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" />
      </div>

      <div class="form-group">
        <label class="form-label" style="display:flex;justify-content:space-between">
          Password
          <a href="#" style="font-size:0.8rem">Forgot password?</a>
        </label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" />
      </div>

      <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px" id="loginBtn" onclick="handleLogin()">
        Sign In
      </button>
    </div>

    <div class="auth-footer">
      Don't have an account? <a href="register.html">Create one free</a>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
