<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar — LifePilot AI</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/dark-mode.css" />
  <style>
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }
    .cal-header-day {
      text-align: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
      padding: 8px 4px;
      text-transform: uppercase;
    }
    .cal-day {
      min-height: 90px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px;
      background: var(--bg-card);
      cursor: pointer;
      transition: var(--transition);
    }
    .cal-day:hover   { border-color: var(--primary); }
    .cal-day.today   { border-color: var(--primary); border-width: 2px; }
    .cal-day.other-month { opacity: 0.35; }
    .cal-day-num {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 4px;
    }
    .cal-day.today .cal-day-num {
      color: #fff;
      background: var(--primary);
      width: 24px; height: 24px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem;
    }
    .cal-task-dot {
      font-size: 0.68rem;
      padding: 1px 5px;
      border-radius: 3px;
      background: var(--primary);
      color: #fff;
      margin-bottom: 2px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .cal-task-dot.high   { background: var(--warning); }
    .cal-task-dot.urgent { background: var(--danger);  }
    .cal-nav {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 20px;
    }
    .cal-nav h3 { flex:1; text-align:center; font-size:1.1rem; }
    @media (max-width:768px) {
      .cal-day { min-height:60px; padding:4px; }
      .cal-task-dot { display:none; }
    }
  </style>
</head>
<body>
<div class="app-shell">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><h1>🧭 LifePilot AI</h1><p>Never Miss What Matters</p></div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a href="dashboard.html" class="nav-item"><span class="icon">🏠</span> Dashboard</a>
      <a href="today.html"     class="nav-item"><span class="icon">☀️</span> Today's Plan</a>
      <a href="tasks.html"     class="nav-item"><span class="icon">✅</span> Tasks</a>
      <a href="calendar.html"  class="nav-item active"><span class="icon">📅</span> Calendar</a>
      <div class="nav-section-label">Growth</div>
      <a href="goals.html"     class="nav-item"><span class="icon">🎯</span> Goals</a>
      <a href="habits.html"    class="nav-item"><span class="icon">🔄</span> Habits</a>
      <a href="analytics.html" class="nav-item"><span class="icon">📊</span> Analytics</a>
      <div class="nav-section-label">AI</div>
      <a href="chat.html"      class="nav-item"><span class="icon">🤖</span> AI Coach</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar" id="sidebarAvatar">?</div>
        <div class="user-info">
          <div class="name" id="sidebarName">Loading...</div>
          <div class="email" id="sidebarEmail"></div>
        </div>
      </div>
      <a href="settings.html" class="nav-item" style="margin-top:8px"><span class="icon">⚙️</span> Settings</a>
      <button onclick="handleLogout()" class="nav-item" style="width:100%;background:none;border:none;color:rgba(255,255,255,0.7);text-align:left;margin-top:4px">
        <span class="icon">🚪</span> Logout
      </button>
    </div>
  </aside>
  <div id="sidebarOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:99"></div>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
        <div style="margin-left:8px"><h2>📅 Calendar</h2><p>Task deadlines at a glance</p></div>
      </div>
      <div class="topbar-right">
        <button class="dark-toggle" id="darkToggle">🌙</button>
        <a href="tasks.html" class="btn btn-primary btn-sm">+ New Task</a>
      </div>
    </header>

    <main class="page-content">
      <div class="card">
        <div class="cal-nav">
          <button class="btn btn-secondary btn-sm" onclick="changeMonth(-1)">◀ Prev</button>
          <h3 id="calMonthLabel">Month Year</h3>
          <button class="btn btn-secondary btn-sm" onclick="changeMonth(1)">Next ▶</button>
        </div>

        <div class="calendar-grid" id="calendarGrid">
          <div class="cal-header-day">Sun</div>
          <div class="cal-header-day">Mon</div>
          <div class="cal-header-day">Tue</div>
          <div class="cal-header-day">Wed</div>
          <div class="cal-header-day">Thu</div>
          <div class="cal-header-day">Fri</div>
          <div class="cal-header-day">Sat</div>
        </div>
      </div>

      <!-- Selected day tasks -->
      <div class="card" style="margin-top:16px" id="dayDetailCard" style="display:none">
        <div class="card-title" id="dayDetailTitle"></div>
        <div id="dayDetailTasks" style="margin-top:12px"></div>
      </div>
    </main>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script>
  let currentYear  = new Date().getFullYear();
  let currentMonth = new Date().getMonth();
  let allTasks     = [];

  auth.onAuthStateChanged(async user => {
    if (!user) return;
    document.getElementById('sidebarName').textContent   = user.displayName || 'User';
    document.getElementById('sidebarEmail').textContent  = user.email;
    document.getElementById('sidebarAvatar').textContent = (user.displayName || 'U')[0].toUpperCase();

    try {
      const data = await apiCall('/api/tasks');
      allTasks = data.tasks || [];
    } catch(e) { allTasks = []; }

    renderCalendar();
  });

  function changeMonth(dir) {
    currentMonth += dir;
    if (currentMonth > 11) { currentMonth = 0;  currentYear++; }
    if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
    renderCalendar();
  }

  function renderCalendar() {
    const monthNames = ['January','February','March','April','May','June',
                        'July','August','September','October','November','December'];
    document.getElementById('calMonthLabel').textContent =
      `${monthNames[currentMonth]} ${currentYear}`;

    const grid      = document.getElementById('calendarGrid');
    const today     = new Date();
    const firstDay  = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
    const daysInPrev  = new Date(currentYear, currentMonth, 0).getDate();

    // Remove old day cells (keep the 7 header cells)
    const children = Array.from(grid.children);
    children.slice(7).forEach(c => c.remove());

    // Build a map: "YYYY-MM-DD" → tasks
    const taskMap = {};
    allTasks.forEach(t => {
      if (!t.deadline) return;
      const d   = new Date(t.deadline);
      const key = d.toISOString().split('T')[0];
      if (!taskMap[key]) taskMap[key] = [];
      taskMap[key].push(t);
    });

    // Previous month fill
    for (let i = firstDay - 1; i >= 0; i--) {
      const day = document.createElement('div');
      day.className = 'cal-day other-month';
      day.innerHTML = `<div class="cal-day-num">${daysInPrev - i}</div>`;
      grid.appendChild(day);
    }

    // Current month
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isToday = (today.getDate()===d && today.getMonth()===currentMonth && today.getFullYear()===currentYear);
      const dayTasks = taskMap[dateStr] || [];

      const cell = document.createElement('div');
      cell.className = `cal-day${isToday ? ' today' : ''}`;
      cell.innerHTML = `
        <div class="cal-day-num">${d}</div>
        ${dayTasks.slice(0,3).map(t => `
          <div class="cal-task-dot ${t.priority === 'urgent' ? 'urgent' : t.priority === 'high' ? 'high' : ''}">
            ${t.title}
          </div>`).join('')}
        ${dayTasks.length > 3 ? `<div style="font-size:0.65rem;color:var(--text-muted)">+${dayTasks.length-3} more</div>` : ''}`;

      cell.onclick = () => showDayDetail(dateStr, dayTasks);
      grid.appendChild(cell);
    }

    // Next month fill
    const totalCells = firstDay + daysInMonth;
    const remaining  = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
    for (let d = 1; d <= remaining; d++) {
      const cell = document.createElement('div');
      cell.className = 'cal-day other-month';
      cell.innerHTML = `<div class="cal-day-num">${d}</div>`;
      grid.appendChild(cell);
    }
  }

  function showDayDetail(dateStr, tasks) {
    const card = document.getElementById('dayDetailCard');
    card.style.display = 'block';
    document.getElementById('dayDetailTitle').textContent =
      `📋 Tasks on ${formatDate(dateStr)}`;

    const container = document.getElementById('dayDetailTasks');
    if (!tasks.length) {
      container.innerHTML = `<p style="color:var(--text-muted);font-size:0.875rem">No tasks due on this date.</p>`;
      return;
    }
    container.innerHTML = `<div class="task-list">${tasks.map(t => `
      <div class="task-item">
        <div class="task-body">
          <div class="task-title">${t.title}</div>
          <div class="task-meta">
            ${priorityBadge(t.priority)} · ${t.category || 'Other'}
            · <span class="badge ${t.status === 'completed' ? 'badge-success' : 'badge-gray'}">${t.status}</span>
          </div>
        </div>
      </div>`).join('')}
    </div>`;

    card.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
</script>
</body>
</html>
